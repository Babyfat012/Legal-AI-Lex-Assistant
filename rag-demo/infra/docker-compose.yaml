name: rag-demo

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333" 
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__STORAGE__BACKEND=local
      - QDRANT__STORAGE__PATH=/qdrant/storage

volumes:
  qdrant_storage:
    driver: local